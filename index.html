<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MBA Classroom Flashcards</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#2563eb;
      --accent2:#dbeafe;
      --shadow:0 12px 30px rgba(0,0,0,.10);
      --radius:22px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%, var(--bg) 35%, #ffffff 100%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{
      max-width:560px;
      margin:0 auto;
      padding:18px 16px 28px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }
    .title{
      font-size:1.2rem;
      font-weight:800;
      line-height:1.25;
    }
    .sub{
      color:var(--muted);
      font-size:.92rem;
      margin-top:4px;
    }
    .pill{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:999px;
      padding:8px 12px;
      font-size:.9rem;
      white-space:nowrap;
      box-shadow:0 4px 14px rgba(0,0,0,.05);
    }
    .progress{
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin:12px 0 18px;
    }
    .bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--accent),#60a5fa);
      transition:width .25s ease;
    }
    .card-shell{
      perspective:1200px;
      margin:8px 0 16px;
    }
    .card{
      position:relative;
      width:100%;
      height:470px;
      transform-style:preserve-3d;
      transition:transform .55s ease;
    }
    .card.flipped{ transform:rotateY(180deg); }
    .face{
      position:absolute;
      inset:0;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backface-visibility:hidden;
      padding:20px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }
    .back{
      transform:rotateY(180deg);
      align-items:flex-start;
      text-align:left;
      justify-content:flex-start;
    }
    .badge{
      align-self:flex-start;
      background:var(--accent2);
      color:var(--accent);
      font-weight:700;
      padding:8px 12px;
      border-radius:999px;
      font-size:.85rem;
      margin-bottom:16px;
    }
    .word{
      font-size:2rem;
      font-weight:800;
      letter-spacing:-.02em;
      line-height:1.2;
      margin-bottom:14px;
    }
    .hint{
      color:var(--muted);
      font-size:.98rem;
      margin-bottom:14px;
    }
    .meaning{
      font-size:1.7rem;
      font-weight:800;
      margin:4px 0 14px;
      line-height:1.25;
    }
    .section{
      width:100%;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:14px;
      margin-top:12px;
    }
    .label{
      font-size:.82rem;
      font-weight:800;
      color:var(--muted);
      margin-bottom:8px;
      letter-spacing:.02em;
    }
    .example{
      font-size:1.02rem;
      line-height:1.55;
      margin-bottom:8px;
    }
    .korean{
      color:#374151;
      line-height:1.55;
    }
    .controls{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:12px;
    }
    button{
      border:none;
      border-radius:16px;
      background:#fff;
      color:var(--text);
      padding:14px 12px;
      font-size:1rem;
      font-weight:800;
      box-shadow:0 8px 20px rgba(0,0,0,.06);
      border:1px solid #e5e7eb;
      cursor:pointer;
    }
    button.primary{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }
    .mini-controls{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }
    .speak-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:8px;
    }
    .speak-row.left{
      justify-content:flex-start;
      width:100%;
    }
    .speak-btn{
      padding:10px 14px;
      border-radius:14px;
      font-size:.95rem;
      font-weight:800;
      background:#eef2ff;
      border:1px solid #c7d2fe;
      box-shadow:none;
    }
    .footer-note{
      margin-top:16px;
      color:var(--muted);
      font-size:.9rem;
      text-align:center;
      line-height:1.45;
    }
    .gesture{
      margin-top:12px;
      text-align:center;
      font-size:.9rem;
      color:var(--muted);
    }
    @media (max-width:420px){
      .card{height:490px}
      .word{font-size:1.75rem}
      .meaning{font-size:1.45rem}
      button{font-size:.95rem}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">MBA Classroom Rules<br>발음 포함 플립카드</div>
        <div class="sub">탭하면 뒤집기 · 좌우 스와이프로 넘기기</div>
      </div>
      <div class="pill" id="count">1 / 20</div>
    </div>

    <div class="progress"><div class="bar" id="bar"></div></div>

    <div class="card-shell">
      <div class="card" id="card">
        <div class="face front">
          <div class="badge" id="typeBadge">단어</div>
          <div class="word" id="frontWord">guideline</div>
          <div class="hint">카드를 눌러 뜻과 예문 보기</div>
          <div class="speak-row">
            <button class="speak-btn" id="speakWordBtn" type="button">🔊 단어 발음</button>
          </div>
        </div>

        <div class="face back">
          <div class="badge" id="backTypeBadge">단어</div>
          <div class="meaning" id="meaning">지침</div>

          <div class="section">
            <div class="label">예문</div>
            <div class="example" id="example">The teacher gave us clear guidelines for the project.</div>
            <div class="korean" id="translation">선생님은 프로젝트에 대한 명확한 지침을 주셨다.</div>
            <div class="speak-row left">
              <button class="speak-btn" id="speakExampleBtn" type="button">🔊 예문 발음</button>
            </div>
          </div>

          <div class="section">
            <div class="label">간단 설명</div>
            <div class="korean" id="desc">규칙이나 방향을 알려 주는 기준이나 안내.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="prevBtn" type="button">◀ 이전</button>
      <button class="primary" id="flipBtn" type="button">뒤집기</button>
      <button id="nextBtn" type="button">다음 ▶</button>
    </div>

    <div class="mini-controls">
      <button id="shuffleBtn" type="button">섞기</button>
      <button id="restartBtn" type="button">처음부터</button>
    </div>

    <div class="gesture">폰에서는 카드 영역을 좌우로 밀어도 넘어가.</div>
    <div class="footer-note">아이폰은 Safari에서 열고, 공유 버튼으로 홈 화면에 추가하면 앱처럼 쓸 수 있어.</div>
  </div>

<script>
const originalCards = [
  {type:"단어", front:"guideline", back:"지침", example:"The teacher gave us clear guidelines for the project.", ko:"선생님은 프로젝트에 대한 명확한 지침을 주셨다.", desc:"규칙이나 방향을 알려 주는 기준이나 안내."},
  {type:"단어", front:"ensure", back:"보장하다", example:"These rules ensure a safe learning environment.", ko:"이 규칙들은 안전한 학습 환경을 보장한다.", desc:"어떤 일이 확실히 이루어지도록 하다."},
  {type:"단어", front:"pleasant", back:"즐거운", example:"We had a pleasant discussion in class.", ko:"우리는 수업에서 즐거운 토론을 했다.", desc:"기분 좋고 편안한 느낌의."},
  {type:"단어", front:"treat", back:"대하다", example:"Students should treat others kindly.", ko:"학생들은 다른 사람을 친절하게 대해야 한다.", desc:"사람이나 상황을 어떤 방식으로 대하거나 다루다."},
  {type:"단어", front:"respect", back:"존중", example:"Show respect to your professor.", ko:"교수님께 존중을 보여라.", desc:"상대의 가치나 입장을 인정하고 예의를 지키는 태도."},
  {type:"단어", front:"considerate", back:"배려하는", example:"She is considerate of her classmates.", ko:"그녀는 반 친구들을 배려한다.", desc:"다른 사람의 상황이나 감정을 생각해 주는."},
  {type:"단어", front:"attendance", back:"출석", example:"Attendance is important in this course.", ko:"이 수업에서는 출석이 중요하다.", desc:"수업이나 모임에 실제로 나오는 것."},
  {type:"단어", front:"issue", back:"문제", example:"He talked to the professor about his attendance issue.", ko:"그는 출석 문제에 대해 교수님과 이야기했다.", desc:"해결하거나 다뤄야 하는 문제나 사안."},
  {type:"단어", front:"absence", back:"결석", example:"Too many absences can lower your grade.", ko:"결석이 너무 많으면 성적이 내려갈 수 있다.", desc:"와야 할 곳에 오지 않은 상태."},
  {type:"단어", front:"unexcused", back:"무단의", example:"Unexcused absences are not allowed.", ko:"무단결석은 허용되지 않는다.", desc:"정당한 사유나 허가가 없는 상태."},
  {type:"단어", front:"acceptable", back:"허용되는", example:"Late homework is not acceptable.", ko:"늦은 과제 제출은 허용되지 않는다.", desc:"받아들일 수 있거나 규칙상 인정되는."},
  {type:"단어", front:"participation", back:"참여", example:"Class participation affects your grade.", ko:"수업 참여는 성적에 영향을 준다.", desc:"활동이나 수업에 직접 참여하는 것."},
  {type:"단어", front:"opinion", back:"의견", example:"Everyone shared their opinion in the discussion.", ko:"모든 사람이 토론에서 자신의 의견을 나누었다.", desc:"어떤 일에 대해 개인이 가지는 생각."},
  {type:"단어", front:"intellectual", back:"지적인", example:"The class had an intellectual debate.", ko:"그 수업에서는 지적인 토론이 있었다.", desc:"생각하고 분석하는 능력과 관련된."},
  {type:"단어", front:"discussion", back:"토론", example:"Group discussion helps learning.", ko:"조별 토론은 학습에 도움이 된다.", desc:"의견을 주고받으며 함께 이야기하는 것."},
  {type:"단어", front:"polite", back:"예의 바른", example:"Always be polite during class discussions.", ko:"수업 토론 중에는 항상 예의 바르게 행동해라.", desc:"상대에게 무례하지 않고 예의를 지키는."},
  {type:"숙어", front:"pay attention", back:"집중하다", example:"Students must pay attention in class.", ko:"학생들은 수업 시간에 집중해야 한다.", desc:"신경을 쓰고 주의를 기울이다."},
  {type:"숙어", front:"call on", back:"지명하다", example:"The professor called on me to answer.", ko:"교수님이 나를 지명해 답하게 하셨다.", desc:"수업에서 특정 학생에게 답변을 요구하다."},
  {type:"숙어", front:"in advance", back:"미리", example:"Please inform the professor in advance.", ko:"교수님께 미리 알려 주세요.", desc:"어떤 일보다 앞서서, 사전에."},
  {type:"숙어", front:"be graded on", back:"~을 기준으로 평가되다", example:"Students are graded on participation.", ko:"학생들은 참여도를 기준으로 평가된다.", desc:"무엇을 기준으로 점수나 평가가 매겨지다."}
];

let cards = [...originalCards];
let index = 0;
let flipped = false;

const card = document.getElementById('card');
const count = document.getElementById('count');
const bar = document.getElementById('bar');
const typeBadge = document.getElementById('typeBadge');
const backTypeBadge = document.getElementById('backTypeBadge');
const frontWord = document.getElementById('frontWord');
const meaning = document.getElementById('meaning');
const example = document.getElementById('example');
const translation = document.getElementById('translation');
const desc = document.getElementById('desc');
const speakWordBtn = document.getElementById('speakWordBtn');
const speakExampleBtn = document.getElementById('speakExampleBtn');

function render(){
  const c = cards[index];
  typeBadge.textContent = c.type;
  backTypeBadge.textContent = c.type;
  frontWord.textContent = c.front;
  meaning.textContent = c.back;
  example.textContent = c.example;
  translation.textContent = c.ko;
  desc.textContent = c.desc;
  count.textContent = `${index + 1} / ${cards.length}`;
  bar.style.width = `${((index + 1) / cards.length) * 100}%`;
  card.classList.remove('flipped');
  flipped = false;
  window.speechSynthesis.cancel();
}

function flipCard(){
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function nextCard(){
  if(index < cards.length - 1){
    index++;
    render();
  }
}

function prevCard(){
  if(index > 0){
    index--;
    render();
  }
}

function shuffleCards(){
  for(let i = cards.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  index = 0;
  render();
}

function restart(){
  cards = [...originalCards];
  index = 0;
  render();
}

function speakText(text){
  if(!('speechSynthesis' in window)) {
    alert('이 브라우저는 음성 재생을 지원하지 않아.');
    return;
  }
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  const voices = window.speechSynthesis.getVoices();
  const englishVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en-us'))
                    || voices.find(v => v.lang && v.lang.toLowerCase().startsWith('en'))
                    || null;
  if (englishVoice) utterance.voice = englishVoice;

  window.speechSynthesis.speak(utterance);
}

function speakCurrentWord(e){
  if(e) e.stopPropagation();
  speakText(cards[index].front);
}

function speakCurrentExample(e){
  if(e) e.stopPropagation();
  speakText(cards[index].example);
}

document.getElementById('flipBtn').addEventListener('click', flipCard);
document.getElementById('nextBtn').addEventListener('click', nextCard);
document.getElementById('prevBtn').addEventListener('click', prevCard);
document.getElementById('shuffleBtn').addEventListener('click', shuffleCards);
document.getElementById('restartBtn').addEventListener('click', restart);

speakWordBtn.addEventListener('click', speakCurrentWord);
speakExampleBtn.addEventListener('click', speakCurrentExample);

card.addEventListener('click', flipCard);

let startX = 0;
let startY = 0;

card.addEventListener('touchstart', (e) => {
  const t = e.changedTouches[0];
  startX = t.clientX;
  startY = t.clientY;
}, {passive:true});

card.addEventListener('touchend', (e) => {
  const t = e.changedTouches[0];
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;
  if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) nextCard();
    else prevCard();
  }
}, {passive:true});

if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => {
    window.speechSynthesis.getVoices();
  };
}

render();
</script>
</body>
</html>
